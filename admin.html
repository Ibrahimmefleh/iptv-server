<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>لوحة التحكم — الحسن الرياضية</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;background:#0a0a0a;color:#fff;min-height:100vh}
    header{background:#111;border-bottom:2px solid #c00;padding:16px 20px;display:flex;align-items:center;justify-content:space-between}
    .brand{font-size:18px;font-weight:700}
    .logout{background:#c00;border:none;color:#fff;padding:8px 16px;border-radius:4px;cursor:pointer;font-weight:600}
    .logout:hover{background:#a00}
    main{max-width:1200px;margin:0 auto;padding:20px}
    .tabs{display:flex;gap:10px;margin-bottom:20px;border-bottom:2px solid #222}
    .tab-btn{background:none;border:none;color:rgba(255,255,255,.5);padding:12px 20px;cursor:pointer;font-weight:600;border-bottom:3px solid transparent;transition:all .2s}
    .tab-btn.active{color:#fff;border-bottom-color:#c00}
    .tab-btn:hover{color:#fff}
    .tab-content{display:none}
    .tab-content.active{display:block}
    .section{background:#161616;border:1px solid #222;border-radius:8px;padding:20px;margin-bottom:20px}
    .section-title{font-size:16px;font-weight:700;margin-bottom:16px;color:#fff}
    .channel-card{background:#0a0a0a;border:1px solid #333;border-radius:6px;padding:16px;margin-bottom:12px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;align-items:center}
    .channel-name{font-weight:600;grid-column:1}
    .channel-status{font-size:12px;grid-column:2}
    .channel-actions{display:flex;gap:8px;grid-column:3;justify-content:flex-end}
    .btn{background:#c00;border:none;color:#fff;padding:8px 12px;border-radius:4px;cursor:pointer;font-weight:600;font-size:12px;transition:all .2s}
    .btn:hover{background:#a00}
    .btn.secondary{background:#333;color:#fff}
    .btn.secondary:hover{background:#444}
    .badge{display:inline-block;padding:4px 8px;border-radius:4px;font-size:11px;font-weight:700}
    .badge.on{background:#0d3321;color:#3fb950}
    .badge.off{background:#3b0d0c;color:#f85149}
    .form-group{margin-bottom:16px}
    .form-group label{display:block;margin-bottom:6px;font-weight:600;font-size:13px;color:rgba(255,255,255,.8)}
    .form-group input,.form-group textarea{width:100%;padding:10px;background:#0a0a0a;border:1px solid #333;border-radius:4px;color:#fff;font-family:inherit;font-size:13px}
    .form-group input:focus,.form-group textarea:focus{outline:none;border-color:#c00}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);align-items:center;justify-content:center;z-index:99}
    .modal.show{display:flex}
    .modal-content{background:#161616;border:1px solid #333;border-radius:8px;padding:24px;max-width:500px;width:90%}
    .modal-title{font-size:18px;font-weight:700;margin-bottom:16px}
    .modal-close{position:absolute;top:16px;right:16px;background:none;border:none;color:#fff;font-size:24px;cursor:pointer}
    .alert{padding:12px 16px;border-radius:4px;margin-bottom:16px;font-size:13px}
    .alert.success{background:#0d3321;color:#3fb950;border:1px solid #3fb950}
    .alert.error{background:#3b0d0c;color:#f85149;border:1px solid #f85149}
    .alert.info{background:#0b2540;color:#58a6ff;border:1px solid #58a6ff}
    .stat-box{background:#0a0a0a;border:1px solid #333;border-radius:6px;padding:16px;text-align:center;margin-bottom:12px}
    .stat-value{font-size:24px;font-weight:700;color:#c00;margin-bottom:4px}
    .stat-label{font-size:12px;color:rgba(255,255,255,.5)}
    .ticker-preview{background:#0a0a0a;border:1px solid #c00;border-radius:4px;padding:12px;margin-top:12px;font-size:13px;color:#c00;overflow:hidden;white-space:nowrap;animation:scroll 10s linear infinite}
    @keyframes scroll{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}
  </style>
</head>
<body>

<header>
  <div class="brand">🎬 لوحة التحكم — الحسن الرياضية</div>
  <button class="logout" onclick="logout()">تسجيل الخروج</button>
</header>

<main>
  <div class="alert alert-info" id="loginAlert" style="display:none">
    يرجى إدخال كلمة المرور الإدارية
  </div>

  <div id="loginForm" style="display:none;max-width:400px;margin:40px auto">
    <div class="section">
      <div class="section-title">تسجيل الدخول</div>
      <div class="form-group">
        <label>كلمة المرور</label>
        <input type="password" id="passwordInput" placeholder="أدخل كلمة المرور" onkeypress="if(event.key==='Enter')login()"/>
      </div>
      <button class="btn" onclick="login()" style="width:100%">دخول</button>
    </div>
  </div>

  <div id="dashboard" style="display:none">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('channels')">إدارة القنوات</button>
      <button class="tab-btn" onclick="switchTab('ticker')">الشريط الإخباري</button>
      <button class="tab-btn" onclick="switchTab('stats')">الإحصائيات</button>
    </div>

    <!-- Channels Tab -->
    <div id="channels" class="tab-content active">
      <div class="section">
        <div class="section-title">إدارة القنوات</div>
        <div id="channelsList"></div>
      </div>
    </div>

    <!-- Ticker Tab -->
    <div id="ticker" class="tab-content">
      <div class="section">
        <div class="section-title">الشريط الإخباري</div>
        <div class="form-group">
          <label>النص</label>
          <textarea id="tickerText" placeholder="أدخل نص الشريط الإخباري" rows="3"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>عدد مرات التكرار</label>
            <input type="number" id="tickerRepeat" min="1" value="1"/>
          </div>
          <div class="form-group">
            <label>تفعيل الشريط</label>
            <input type="checkbox" id="tickerEnabled" style="width:auto;margin-top:10px"/>
          </div>
        </div>
        <button class="btn" onclick="saveTicker()" style="width:100%">حفظ الشريط</button>
        <div class="ticker-preview" id="tickerPreview" style="display:none;margin-top:16px"></div>
      </div>
    </div>

    <!-- Stats Tab -->
    <div id="stats" class="tab-content">
      <div class="section">
        <div class="section-title">إحصائيات البث</div>
        <div id="statsList"></div>
      </div>
    </div>
  </div>
</main>

<!-- Modals -->
<div class="modal" id="editChannelModal">
  <div class="modal-content">
    <button class="modal-close" onclick="closeModal('editChannelModal')">×</button>
    <div class="modal-title">تحرير القناة</div>
    <input type="hidden" id="editChannelId"/>
    <div class="form-group">
      <label>رابط المصدر الحالي</label>
      <input type="text" id="editChannelSource" placeholder="أدخل رابط المصدر"/>
    </div>
    <div class="form-group">
      <label>رابط مؤقت (اختياري)</label>
      <input type="text" id="editChannelTempSource" placeholder="رابط بديل مؤقت"/>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>وقت البدء</label>
        <input type="datetime-local" id="editChannelStartTime"/>
      </div>
      <div class="form-group">
        <label>وقت الانتهاء</label>
        <input type="datetime-local" id="editChannelEndTime"/>
      </div>
    </div>
    <button class="btn" onclick="updateChannel()" style="width:100%">حفظ التغييرات</button>
  </div>
</div>

<script>
let adminToken = localStorage.getItem('adminToken');
const SERVER = window.location.origin;

function login() {
  const password = document.getElementById('passwordInput').value;
  if (!password) {
    alert('يرجى إدخال كلمة المرور');
    return;
  }
  
  adminToken = password;
  localStorage.setItem('adminToken', password);
  showDashboard();
  loadChannels();
  loadTicker();
  loadStats();
}

function logout() {
  adminToken = null;
  localStorage.removeItem('adminToken');
  location.reload();
}

function showDashboard() {
  document.getElementById('loginForm').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
}

function switchTab(tabName) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById(tabName).classList.add('active');
  event.target.classList.add('active');
  
  if (tabName === 'stats') loadStats();
}

async function loadChannels() {
  try {
    const res = await fetch(`${SERVER}/api/admin/channels?token=${adminToken}`);
    if (!res.ok) throw new Error('Unauthorized');
    
    const channels = await res.json();
    const html = Object.values(channels).map(ch => `
      <div class="channel-card">
        <div class="channel-name">${ch.name}</div>
        <div class="channel-status">
          <span class="badge ${ch.active ? 'on' : 'off'}">${ch.active ? 'ON' : 'OFF'}</span>
          <span style="color:rgba(255,255,255,.5);margin-right:8px">${ch.viewers} مشاهد</span>
        </div>
        <div class="channel-actions">
          <button class="btn ${ch.active ? 'secondary' : ''}" onclick="toggleChannel('${ch.id}')">${ch.active ? 'إيقاف' : 'تشغيل'}</button>
          <button class="btn secondary" onclick="openEditModal('${ch.id}')">تحرير</button>
        </div>
      </div>
    `).join('');
    
    document.getElementById('channelsList').innerHTML = html;
  } catch (e) {
    alert('خطأ في تحميل القنوات');
  }
}

async function toggleChannel(channelId) {
  try {
    const res = await fetch(`${SERVER}/api/admin/channel/${channelId}/toggle`, {
      method: 'POST',
      headers: { 'x-admin-token': adminToken }
    });
    if (res.ok) {
      loadChannels();
    }
  } catch (e) {
    alert('خطأ في تبديل القناة');
  }
}

function openEditModal(channelId) {
  document.getElementById('editChannelId').value = channelId;
  document.getElementById('editChannelModal').classList.add('show');
  
  // Load current source
  fetch(`${SERVER}/api/admin/channels?token=${adminToken}`)
    .then(r => r.json())
    .then(channels => {
      const ch = channels[channelId];
      document.getElementById('editChannelSource').value = ch.source;
    });
}

function closeModal(modalId) {
  document.getElementById(modalId).classList.remove('show');
}

async function updateChannel() {
  const channelId = document.getElementById('editChannelId').value;
  const source = document.getElementById('editChannelSource').value;
  const tempSource = document.getElementById('editChannelTempSource').value;
  const startTime = document.getElementById('editChannelStartTime').value;
  const endTime = document.getElementById('editChannelEndTime').value;

  if (!source) {
    alert('يرجى إدخال رابط المصدر');
    return;
  }

  try {
    // Update source
    let res = await fetch(`${SERVER}/api/admin/channel/${channelId}/source`, {
      method: 'PUT',
      headers: {
        'x-admin-token': adminToken,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ source })
    });

    if (!res.ok) throw new Error('Failed to update source');

    // Schedule change if provided
    if (tempSource && startTime && endTime) {
      res = await fetch(`${SERVER}/api/admin/channel/${channelId}/schedule`, {
        method: 'POST',
        headers: {
          'x-admin-token': adminToken,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          tempSource,
          startTime: new Date(startTime).toISOString(),
          endTime: new Date(endTime).toISOString()
        })
      });

      if (!res.ok) throw new Error('Failed to schedule change');
    }

    alert('تم حفظ التغييرات بنجاح');
    closeModal('editChannelModal');
    loadChannels();
  } catch (e) {
    alert('خطأ: ' + e.message);
  }
}

async function loadTicker() {
  try {
    const res = await fetch(`${SERVER}/api/ticker`);
    const ticker = await res.json();
    
    document.getElementById('tickerText').value = ticker.text || '';
    document.getElementById('tickerRepeat').value = ticker.repeatCount || 1;
    document.getElementById('tickerEnabled').checked = ticker.enabled || false;
    
    if (ticker.enabled && ticker.text) {
      document.getElementById('tickerPreview').textContent = ticker.text;
      document.getElementById('tickerPreview').style.display = 'block';
    }
  } catch (e) {
    console.error('Error loading ticker:', e);
  }
}

async function saveTicker() {
  const text = document.getElementById('tickerText').value;
  const repeatCount = parseInt(document.getElementById('tickerRepeat').value) || 1;
  const enabled = document.getElementById('tickerEnabled').checked;

  try {
    const res = await fetch(`${SERVER}/api/admin/ticker`, {
      method: 'PUT',
      headers: {
        'x-admin-token': adminToken,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ text, repeatCount, enabled })
    });

    if (res.ok) {
      alert('تم حفظ الشريط بنجاح');
      loadTicker();
    }
  } catch (e) {
    alert('خطأ في حفظ الشريط');
  }
}

async function loadStats() {
  try {
    const res = await fetch(`${SERVER}/api/stream/stats`);
    const stats = await res.json();
    
    const totalViewers = stats.reduce((sum, ch) => sum + ch.viewers, 0);
    const activeChannels = stats.filter(ch => ch.active).length;
    
    const html = `
      <div class="stat-box">
        <div class="stat-value">${totalViewers}</div>
        <div class="stat-label">إجمالي المشاهدين</div>
      </div>
      <div class="stat-box">
        <div class="stat-value">${activeChannels}/${stats.length}</div>
        <div class="stat-label">القنوات النشطة</div>
      </div>
      ${stats.map(ch => `
        <div class="stat-box">
          <div class="stat-value">${ch.viewers}</div>
          <div class="stat-label">${ch.name}</div>
        </div>
      `).join('')}
    `;
    
    document.getElementById('statsList').innerHTML = html;
  } catch (e) {
    console.error('Error loading stats:', e);
  }
}

// Initialize
window.addEventListener('load', () => {
  if (adminToken) {
    showDashboard();
    loadChannels();
    loadTicker();
  } else {
    document.getElementById('loginForm').style.display = 'block';
  }
});

// Refresh stats every 5 seconds
setInterval(() => {
  if (document.getElementById('stats').classList.contains('active')) {
    loadStats();
  }
}, 5000);
</script>
</body>
</html>
